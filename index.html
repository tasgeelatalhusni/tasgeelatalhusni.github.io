<!-- Generated by GitHub Copilot assistant - customize title, artist, cover image and links -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Album Landing — Replace with your album title</title>
  <style>
    :root{--bg:#1a1a1a;--card:#0f0f0f;--text:#e6e6e6;--muted:#999999;--accent:#808080}
    /* Ensure the background covers the full viewport and stays fixed to avoid a darker bar at the bottom */
    html,body{height:100vh;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:linear-gradient(180deg,#0a0a0a 0%, #1a1a1a 100%);background-color:var(--bg);background-attachment:fixed;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px}
    /* prevent the card from overflowing the viewport */
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:36px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,0.6);max-width:820px;width:100%;text-align:center}
    .cover{width:320px;height:320px;margin:0 auto;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);display:block;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
    @media (max-width:520px){.cover{width:220px;height:220px}}
    h1{font-size:1.4rem;margin:18px 0 6px;color:var(--text)}
    h2{font-size:1rem;margin:0 0 18px;color:var(--muted);font-weight:500}
    /* Platform grid styled like a table */
    .platforms{width:100%;margin:20px auto 0;border-collapse:separate;border-spacing:0 8px;table-layout:fixed}
    .platforms td{padding:12px 18px;text-align:center;vertical-align:middle;background:#3a3a3a;border-radius:10px}
    .platforms a{display:flex;align-items:center;gap:12px;justify-content:flex-start;text-decoration:none;color:var(--text);padding:8px 14px;border-radius:10px;transition:transform .12s ease, background .12s ease}
    .platforms a:hover{transform:translateY(-4px);background:rgba(255,255,255,0.05)}
    /* logo image sizing */
    .logo-img{width:44px;height:44px;flex:0 0 44px;display:inline-block;align-items:center;justify-content:center;object-fit:contain}
    .label{font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    /* ensure links don't expand beyond the cell */
    .platform-cell{display:table-cell;width:100%;max-width:100%}
    /* make the platforms list scroll internally on very small viewports */
    @media (max-height:700px){
      .platforms{display:block;max-height:40vh;overflow:auto;border-spacing:0}
      .platform-row{display:block;margin-bottom:8px}
      .platform-cell{display:block;background:#3a3a3a;border-radius:10px}
      .platforms a{justify-content:center}
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card" role="main">
      <!-- Replace cover.jpg with your album cover file in the repo root, or change the src to an external URL -->
      <img id="cover" class="cover" src="cover.png" alt="Album cover art">
      <h1 id="album-title">Shell and Core - عَ العَضم</h1>
      <h2 id="artist-name">Tasgeelat Al-Husni - تسجيلات الحُسني</h2>

      <!-- Platforms grid: update href values with your release links -->
      <table class="platforms" role="list">
        <tbody>
          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://alhusni.bandcamp.com/album/shell-and-core" aria-label="Open on Bandcamp">
                <img class="logo-img" src="Bandcamp-bc-logotype-color.svg" alt="Bandcamp logo">
                <span class="label">Bandcamp</span>
              </a>
            </td>
          </tr>
          
          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://www.youtube.com/playlist?list=PLYsNL93CiUUM" aria-label="Open on YouTube">
                <img class="logo-img" src="Youtube_logo.png" alt="YouTube logo">
                <span class="label">YouTube</span>
              </a>
            </td>
          </tr>
          
          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://open.spotify.com/album/4agoblFfRJKduMhfcrWYzV" aria-label="Open on Spotify">
                <img class="logo-img" src="Spotify_icon.svg" alt="Spotify logo">
                <span class="label">Spotify</span>
              </a>
            </td>
          </tr>

          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://music.apple.com/us/album/shell-and-core/6781142240" aria-label="Open on Apple Music">
                <img class="logo-img" src="Apple_Music_logo.svg" alt="Apple Music logo">
                <span class="label">Apple Music</span>
              </a>
            </td>
          </tr>

          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://www.deezer.com/us/album/1005792691" aria-label="Open on Deezer">
                <img class="logo-img" src="Deezer_logo_2023.svg" alt="Deezer logo">
                <span class="label">Deezer</span>
              </a>
            </td>
          </tr>

        </tbody>
      </table>
    </main>
  </div>
</body>
</html>
