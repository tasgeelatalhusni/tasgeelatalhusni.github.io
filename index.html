<!-- Generated by GitHub Copilot assistant - customize title, artist, cover image and links -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Album Landing — Replace with your album title</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--text:#e6eef8;--muted:#9fb0c8;--accent:#1db954}
    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:linear-gradient(180deg,#071023 0%, #071a2b 100%);color:var(--text);-webkit-font-smoothing:antialiased}
    .page{min-height:100%;display:flex;align-items:center;justify-content:center;padding:48px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:36px;border-radius:18px;box-shadow:0 10px 30px rgba(2,6,23,0.6);max-width:820px;width:100%;text-align:center}
    .cover{width:320px;height:320px;margin:0 auto;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#0b1220,#122033);display:block;object-fit:cover;box-shadow:0 8px 20px rgba(2,6,23,0.6)}
    @media (max-width:520px){.cover{width:220px;height:220px}}
    h1{font-size:1.4rem;margin:18px 0 6px;color:var(--text)}
    h2{font-size:1rem;margin:0 0 18px;color:var(--muted);font-weight:500}
    /* Platform grid styled like a table */
    .platforms{width:100%;margin:20px auto 0;border-collapse:collapse;}
    .platforms td{padding:12px 18px;text-align:center}
    .platforms a{display:flex;align-items:center;gap:12px;justify-content:center;text-decoration:none;color:var(--text);padding:8px 14px;border-radius:10px;transition:transform .12s ease, background .12s ease}
    .platforms a:hover{transform:translateY(-4px);background:rgba(255,255,255,0.02)}
    .logo{width:44px;height:44px;flex:0 0 44px;display:inline-flex;align-items:center;justify-content:center}
    .label{font-size:0.95rem}
    /* Make it look table-like: two columns on wide screens, one column on narrow */
    @media (min-width:560px){
      .platform-row{display:table-row}
      .platform-cell{display:table-cell;width:50%}
    }
    @media (max-width:559px){
      .platform-row{display:block}
      .platform-cell{display:block}
    }
    footer{margin-top:22px;color:var(--muted);font-size:0.85rem}
  </style>
</head>
<body>
  <div class="page">
    <main class="card" role="main">
      <!-- Replace cover.jpg with your album cover file in the repo root, or change the src to an external URL -->
      <img id="cover" class="cover" src="cover.png" alt="Album cover art">
      <h1 id="album-title">Shell and Core - عَ العَضم</h1>
      <h2 id="artist-name">Tasgeelat Al-Husni - تسجيلات الحُسني</h2>

      <!-- Platforms grid: update href values with your release links -->

        <tbody>
          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://open.spotify.com/album/4agoblFfRJKduMhfcrWYzV" aria-label="Open on Spotify">
                <span class="logo" aria-hidden="true">
                  <!-- Spotify-ish circle wave mark (simple, non-branded) -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" fill="var(--accent)" />
                    <path d="M7.5 9.8c4-2.3 8.9-1.7 10.6 0" stroke="#052118" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6.7 13c3.3-1.8 7.3-1.4 9 0" stroke="#052118" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7.3 15.7c2-1 5-1 7 0" stroke="#052118" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="label">Spotify</span>
              </a>
            </td>
            <td class="platform-cell">
              <a class="platform" href="https://music.apple.com/us/album/shell-and-core/6781142240" aria-label="Open on Apple Music">
                <span class="logo" aria-hidden="true">
                  <!-- Simple music-note icon for Apple/Apple Music -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="5" fill="#111827" />
                    <path d="M9 8v8a2 2 0 0 0 2 2 2 2 0 0 0 2-2V8l4-1v8" stroke="#e6eef8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="label">Apple Music</span>
              </a>
            </td>
          </tr>

          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://alhusni.bandcamp.com/album/shell-and-core" aria-label="Open on Bandcamp">
                <span class="logo" aria-hidden="true">
                  <!-- Bandcamp-ish square with B -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="4" fill="#1f2937" />
                    <text x="12" y="16" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e6eef8">BC</text>
                  </svg>
                </span>
                <span class="label">Bandcamp</span>
              </a>
            </td>
            <td class="platform-cell">
              <a class="platform" href="#replace-soundcloud" aria-label="Open on SoundCloud">
                <span class="logo" aria-hidden="true">
                  <!-- SoundCloud-ish cloud -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="5" fill="#ff7a00" />
                    <path d="M6 15v-2a3 3 0 0 1 3-3h0" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 12h6a4 4 0 0 1 0 8H9" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="label">SoundCloud</span>
              </a>
            </td>
          </tr>

          <tr class="platform-row">
            <td class="platform-cell">
              <a class="platform" href="https://www.youtube.com/playlist?list=PLYsNL93CiUUM" aria-label="Open on YouTube">
                <span class="logo" aria-hidden="true">
                  <!-- YouTube-ish play button -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="5" fill="#ff0000" />
                    <path d="M10 9.5v5l4-2.5-4-2.5z" fill="#fff"/>
                  </svg>
                </span>
                <span class="label">YouTube</span>
              </a>
            </td>
            <td class="platform-cell">
              <a class="platform" href="#replace-other" aria-label="Other link">
                <span class="logo" aria-hidden="true">
                  <!-- Generic link icon -->
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="5" fill="#0b1220" />
                    <path d="M10 13a3 3 0 0 1 0 4l-1 1a3 3 0 0 1-4 0 3 3 0 0 1 0-4l1-1" stroke="#e6eef8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 11a3 3 0 0 1 0-4l1-1a3 3 0 0 1 4 0 3 3 0 0 1 0 4l-1 1" stroke="#e6eef8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="label">Other</span>
              </a>
            </td>
          </tr>
        </tbody>
      </table>

      <footer>
        Replace the placeholder text, upload a square cover image named <code>cover.jpg</code> to the repo root (or change the image src), and update each platform link's href to your release pages.
      </footer>
    </main>
  </div>
</body>
</html>
